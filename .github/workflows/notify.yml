name: Notify on commit

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      SHOW_AUTHOR: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract pushed commits
        id: get_commits
        run: |
          PUSHER_USERNAME="${{ github.actor }}"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          IS_FORCE="false"
          MAX=30

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # New branch: show only the latest commit
            IS_FORCE="true"
            MAX=1
            COUNT=1
          elif git merge-base --is-ancestor "$BEFORE" "$AFTER" 2>/dev/null; then
            # Normal push: before is ancestor of after
            COUNT=$(git rev-list "${BEFORE}..${AFTER}" --count)
          else
            # Force push: before is NOT ancestor of after (reset --hard case)
            IS_FORCE="true"
            MAX=1
            COUNT=1
          fi

          if [ "$COUNT" -eq 0 ]; then
            echo "commits=" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            echo "forced=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$SHOW_AUTHOR" = "true" ]; then
            FORMAT="‣ %s (<a href='https://github.com/${{ github.repository }}/commit/%H'>%h</a>) by <a href='https://github.com/$PUSHER_USERNAME'>%an</a>"
          else
            FORMAT="‣ %s (<a href='https://github.com/${{ github.repository }}/commit/%H'>%h</a>) by OctoGram-Dev"
          fi

          if [ "$IS_FORCE" = "true" ]; then
            COMMITS=$(git log "${AFTER}" --pretty=format:"$FORMAT" --max-count=$MAX)
          else
            COMMITS=$(git log "${BEFORE}..${AFTER}" --pretty=format:"$FORMAT" --max-count=$MAX)
          fi

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "forced=$IS_FORCE" >> $GITHUB_OUTPUT

      - name: Send message on Telegram
        if: success() && steps.get_commits.outputs.count != '0'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          disable_web_page_preview: true
          format: html
          message: |
            📋 New Update in <a href='https://github.com/${{ github.repository }}'>${{ github.repository }}</a> (<a href='https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}'>${{ github.ref_name }}</a>)

            ${{ steps.get_commits.outputs.commits }}

            🔨 ${{ steps.get_commits.outputs.forced == 'true' && format('<a href=''https://github.com/{0}/commit/{1}''>{2} new commit(s)</a>', github.repository, github.sha, steps.get_commits.outputs.count) || format('<a href=''https://github.com/{0}/compare/{1}...{2}''>{3} new commit(s)</a>', github.repository, github.event.before, github.sha, steps.get_commits.outputs.count) }}
